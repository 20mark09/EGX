name: EGX Page Inspector Round 2 (one-off)

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Inspector
        run: python inspect_pages_2.py

      - name: Upload HTML dumps
        uses: actions/upload-artifact@v4
        with:
          name: egx-page-dumps-2
          path: |
            market_watch_sectors.html
            investors_type_charts.html
            news_search_disclosures.html
            bulletin_news_ar.html
            homepage_ar.html
          retention-days: 3
